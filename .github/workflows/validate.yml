name: Validate site

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static site root
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -f CNAME
          test -f robots.txt
          test -f sitemap.xml
          test -f impressum.html
          test -f datenschutz.html
          test -f en/index.html
          test -f assets/site.css
          test -f assets/site.js
          test -f assets/nac-control-plane.svg
          ! test -e assets/nac-control-plane.png

          grep -qx 'notariat8.de' CNAME
          grep -q '<strong>Notariat8</strong>' index.html
          grep -q 'brand-n">n</span><span class="brand-eight">8' index.html
          grep -q 'NaC überführt notarielle Abläufe' index.html
          grep -q 'NaC Control Plane' assets/nac-control-plane.svg
          grep -q '<link rel="canonical" href="https://notariat8.de/">' index.html
          grep -q '<link rel="alternate" hreflang="en" href="https://notariat8.de/en/">' index.html
          ! grep -R '\bNoC\b' index.html en/index.html assets/nac-control-plane.svg
          ! grep -R 'nac-control-plane\.png' index.html en/index.html assets/site.css
          ! grep -RE 'fuer|Fuer|ueber|Ueber|pruef|Pruef|freigabefaeh|Oberflaeche|oeffnen|Aender|aender|Ausfuehr|fuehrt|Fuehr|Arbeitsflaechen|Naechster|geprueft|Begruendung|Zurueck|ergaenzt|muessen|enthaelt|vollstaendigt|Veroeffentlichung|ladungsfaehige|zusaetzlichen|veroeffentlichen|Primaer' index.html impressum.html datenschutz.html 404.html README.md
