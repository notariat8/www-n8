name: Validate site

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static site root
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -f CNAME
          test -f robots.txt
          test -f sitemap.xml
          test -f impressum.html
          test -f datenschutz.html
          test -f en/index.html
          test -f assets/site.css
          test -f assets/site.js
          ! test -e assets/nac-control-plane.svg
          ! test -e assets/nac-control-plane.png

          grep -qx 'notariat8.de' CNAME
          grep -q '<strong>Notariat8</strong>' index.html
          grep -q 'https://bild8.de/assets/8/svg/n8.svg' index.html
          grep -q 'Digitale Notariatsprozesse, die kontrollierbar bleiben.' index.html
          grep -q 'Use-Case-Viewer' index.html
          grep -q 'Kanonische Top 10' index.html
          grep -q 'realer finaler Workflow, nur ohne Mandatsdaten' index.html
          grep -q 'https://github.com/notariat8/NaC' index.html
          grep -q 'https://github.com/notariat8/NaC' en/index.html
          grep -q '<link rel="canonical" href="https://notariat8.de/">' index.html
          grep -q '<link rel="alternate" hreflang="en" href="https://notariat8.de/en/">' index.html
          ! grep -R '\bNoC\b' index.html en/index.html
          ! grep -R 'nac-control-plane\.svg' index.html en/index.html assets/site.css
          ! grep -R 'nac-control-plane\.png' index.html en/index.html assets/site.css
          ! grep -R 'github.com/ofunk/NaC\|github.com/ofunk' index.html en/index.html
          ! grep -R 'github.com/notariat8/www-n8' index.html en/index.html
          ! grep -RE 'fuer|Fuer|pruef|Pruef|freigabefaeh|Oberflaeche|oeffnen|Aender|aender|Ausfuehr|fuehrt|Fuehr|Arbeitsflaechen|Naechster|geprueft|Begruendung|Zurueck|ergaenzt|muessen|enthaelt|vollstaendigt|Veroeffentlichung|ladungsfaehige|zusaetzlichen|veroeffentlichen|Primaer' index.html impressum.html datenschutz.html 404.html README.md
